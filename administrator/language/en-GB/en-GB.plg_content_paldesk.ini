PLG_PALDESK_PLUGIN_DESC="<h3>Hello dear Paldesk user!</h3>

To activate Paldesk plugin for WordPress please first open a new tab and register for an account at <a href="www.paldesk.com">www.paldesk.com</a>. After registration, you will be redirected to the Paldesk dashboard.
To find API Key, click on <b>Administration</b> and under <b>Embeddable</b> <b>elements</b> click on the element you need: <b>Website</b> <b>widget</b>, <b>Easy</b> <b>Popup</b> and/or <b>Feedback</b>. Click on tab <b>Install</b> and go to the bottom to <b>copy</b> <b>your</b> <b>unique</b> <b>API</b> <b>Key</b>.
"
; Params
PLG_PALDESK_WIDGET_SCRIPT_URI_PATH="plugins/content/paldesk/scripts/jm_paldesk_widget.js"
PLG_PALDESK_API_KEY_LABEL="API KEY"
